name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build macOS App
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'
          
      - name: Show Swift version
        run: swift --version
        
      - name: Build for Apple Silicon (arm64)
        run: |
          cd SwitchModDownloader
          swift build -c release --arch arm64
          
      - name: Build for Intel Mac (x86_64)
        run: |
          cd SwitchModDownloader
          swift build -c release --arch x86_64
          
      - name: Create app bundles
        run: |
          chmod +x build.sh
          ./build.sh
          
      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwitchModDownloader-arm64
          path: SwitchModDownloader-arm64.zip
          
      - name: Upload x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwitchModDownloader-x86_64
          path: SwitchModDownloader-x86_64.zip
          
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: SwitchModDownloader-arm64
          path: ./artifacts
          
      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: SwitchModDownloader-x86_64
          path: ./artifacts
          
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Switch Mod Downloader for macOS ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Switch Mod Downloader for macOS ${{ steps.get_version.outputs.VERSION }}
            
            ### Downloads
            
            - **SwitchModDownloader-arm64.zip** - For Apple Silicon Macs (M1/M2/M3)
            - **SwitchModDownloader-x86_64.zip** - For Intel-based Macs
            
            ### System Requirements
            
            - macOS 13.0 or later
            
            ### What's Changed
            
            See [CHANGELOG.md](CHANGELOG.md) for details.
            
            ### Installation
            
            1. Download the appropriate zip file for your Mac
            2. Unzip the file
            3. Move `SwitchModDownloader.app` to your Applications folder
            4. Launch the app
            
            **Note:** On first launch, you may need to right-click the app and select "Open" to bypass Gatekeeper.
          files: |
            artifacts/SwitchModDownloader-arm64.zip
            artifacts/SwitchModDownloader-x86_64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
