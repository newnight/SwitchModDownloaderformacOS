name: Build Test

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build macOS App
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'
          
      - name: Show Swift version
        run: swift --version
        
      - name: Build for Apple Silicon (arm64)
        run: |
          cd SwitchModDownloader
          swift build -c release --arch arm64
          
      - name: Build for Intel Mac (x86_64)
        run: |
          cd SwitchModDownloader
          swift build -c release --arch x86_64
          
      - name: Create app bundles
        run: |
          chmod +x build.sh
          ./build.sh
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            SwitchModDownloader-arm64.zip
            SwitchModDownloader-x86_64.zip
          retention-days: 7
